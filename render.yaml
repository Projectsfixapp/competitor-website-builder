services:
  - type: web
    name: competitor-website-builder
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: competitor-builder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_EMAIL
        sync: false
      # LLM Keys – in Render Dashboard eintragen
      # GEMINI_API_KEY ist PFLICHT, nicht optional: wird auch fuer die
      # KI-Bild-Fallback-Generierung genutzt (server/geminiImages.ts),
      # unabhaengig davon welcher Provider fuer Text/Analyse gewaehlt ist.
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Cloudflare R2 (Logo-/Bilder-Uploads) – in Render Dashboard eintragen
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL_BASE
        sync: false

databases:
  - name: competitor-builder-db
    plan: free
    databaseName: competitor_builder
    user: competitor_builder
