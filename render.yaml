services:
  - type: web
    name: competitor-website-builder
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: competitor-builder-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BASIC_AUTH_USER
        value: admin
      - key: BASIC_AUTH_PASS
        generateValue: true
      # LLM Keys – in Render Dashboard eintragen
      # GEMINI_API_KEY ist PFLICHT, nicht optional: wird auch fuer die
      # KI-Bild-Fallback-Generierung genutzt (server/geminiImages.ts),
      # unabhaengig davon welcher Provider fuer Text/Analyse gewaehlt ist.
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Manus-Plattform-Keys (nur wenn auf Manus gehostet)
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      # OAuth (Manus) – optional, für Login
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false

databases:
  - name: competitor-builder-db
    plan: free
    databaseName: competitor_builder
    user: competitor_builder
