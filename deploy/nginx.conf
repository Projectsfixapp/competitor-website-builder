# ─── Competitor Website Builder – nginx Reverse Proxy ────────────────────────
# Platziere diese Datei unter: /etc/nginx/sites-available/competitor-builder
# Symlink: ln -s /etc/nginx/sites-available/competitor-builder /etc/nginx/sites-enabled/
#
# Voraussetzung: certbot installiert und SSL-Zertifikat vorhanden
# sudo certbot --nginx -d deine-domain.de

server {
    listen 80;
    server_name deine-domain.de www.deine-domain.de;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name deine-domain.de www.deine-domain.de;

    # ─── SSL (von certbot automatisch befüllt) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/deine-domain.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deine-domain.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ─── SSE: Kein Buffering für /api/analyze ─────────────────────────────────
    location /api/analyze/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE-spezifisch: kein Buffering, kein Timeout
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_connect_timeout  60s;
        chunked_transfer_encoding on;
    }

    # ─── Alle anderen Requests ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/competitor-builder.access.log;
    error_log  /var/log/nginx/competitor-builder.error.log;
}
